<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home-Page</title>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">

     <!-- font integration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- stylesheet -->
      <link rel="stylesheet" href="style.css">

      <style>
        *{
            font-family: "Geist", sans-serif;
        }
      </style>



</head>
<body>
  <nav>
    <div class="flex py-2 px-2 justify-between">
      <div class="flex py-2 px-2 ">
      <img class="w-10 rounded-full" src="/assets/github-logo.png">
      <h2 class="text-2xl font-semibold text-[#1F2937] items-center">
        GitHub Issues Tracker
      </h2>
      </div>
    <div class="flex gap-2">
    <input type="text"  placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
    </div>
    </div>

    </div>
    <hr class="bg-gray-50">
    
  </nav>
  <div class="w-11/12 flex mx-auto shadow-2xl rounded-xl mt-6 gap-2 py-2 px-2">
  <button id="all-btn" class="btn btn-primary filter-btn">All</button>
  <button id="open-btn" class="btn btn-soft btn-primary filter-btn">Open</button>
  <button id="closed-btn" class="btn btn-soft btn-primary filter-btn">Closed</button>
</div>
    <div class= "w-11/12 mx-auto shadow-2xl rounded-xl mt-6  py-2 px-5">
      <div>
<h2 id="issue-count" class="font-bold text-[#1F2937]">
  <i class="fa-brands fa-chrome items-center w-full"></i>0 Issues
</h2>
      <p class="text-[#64748B] pb-4">Track and manage your project issues</p>
      </div>
      <hr class="w-full shadow">
    
  <div id="Issue-card" class="w-11/12 mx-auto mt-6 grid grid-cols-4 gap-6"></div>
</div>
<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
  <script src="/script/index.js"></script>
</body>
</html>
