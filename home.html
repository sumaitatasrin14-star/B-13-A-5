<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Home-Page</title>
    <link
      rel="shortcut icon"
      href="/assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="flex py-2 px-2 justify-between">
        <div class="flex py-2 px-2">
          <img class="w-10 rounded-full" src="/assets/github-logo.png" />
          <h2 class="text-2xl font-semibold text-[#1F2937] items-center">
            GitHub Issues Tracker
          </h2>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <div>
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
        </div>
      </div>
      <hr class="bg-gray-50" />
    </nav>
    <div
      class="w-11/12 flex mx-auto shadow-2xl rounded-xl mt-6 gap-2 py-2 px-2"
    >
      <button id="all-btn" class="btn btn-primary filter-btn">All</button>
      <button id="open-btn" class="btn btn-soft btn-primary filter-btn">
        Open
      </button>
      <button id="closed-btn" class="btn btn-soft btn-primary filter-btn">
        Closed
      </button>
    </div>
    <div class="flex justify-center items-center py-5">
       <span class="loading loading-bars loading-xl"></span>
    </div>
    <div class="w-11/12 mx-auto shadow-2xl rounded-xl mt-6 py-2 px-5">
      <div>
        <h2 id="issue-count" class="font-bold text-[#1F2937]">
          <i class="fa-brands fa-chrome items-center w-full"></i>0 Issues
        </h2>
        <p class="text-[#64748B] pb-4">Track and manage your project issues</p>
      </div>
      <hr class="w-full shadow" />

      <div
        id="Issue-card"
        class="w-11/12 mx-auto mt-6 grid grid-cols-4 gap-6"
      ></div>
    </div>
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">

    <div id="detail-contain">
      <div class="p-6 bg-white rounded-lg shadow-md max-w-xl">

        <h2 class="text-2xl font-bold mb-4">Fix broken image uploads</h2>

        <div class="flex flex-col gap-4 mb-6">
          <p class="text-gray-700">
            <span class="inline-block rounded-full bg-green-500 text-white px-3 py-1 text-sm font-semibold mr-2">
              Opened
            </span>
            <i class="fa-solid fa-circle text-gray-400 text-xs mr-2"></i>
            Opened by <strong>Fahim Ahmed</strong>
            <i class="fa-solid fa-circle text-gray-400 text-xs mx-2"></i>
            22/02/2026
          </p>

          <p class="text-gray-600">
            The navigation menu doesn't collapse properly on mobile devices.
            Need to fix the responsive behavior.
          </p>

          <div class="flex gap-3">
            <span class="border border-red-300 text-red-500 px-4 py-1 rounded-full font-semibold text-sm">
              BUG
            </span>
            <span class="border border-yellow-400 text-yellow-500 px-3 py-1 rounded-full text-sm font-semibold">
              HELP WANTED
            </span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 bg-gray-100 rounded-md p-4 mb-6 text-gray-700">
          <div>
            <p class="text-sm font-medium">Assignee:</p>
            <h4 class="font-semibold">Fahim Ahmed</h4>
          </div>
          <div>
            <p class="text-sm font-medium">Priority:</p>
            <span class="inline-block bg-red-600 text-white px-3 py-1 rounded-full text-sm font-semibold">
              HIGH
            </span>
          </div>
        </div>

      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>

  </div>
</dialog>
    <script src="/script/index.js"></script>
  </body>
</html>
